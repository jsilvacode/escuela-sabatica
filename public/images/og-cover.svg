<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d33"/>
      <stop offset="50%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#183a5c"/>
    </linearGradient>
    <clipPath id="coverClip">
      <rect x="80" y="120" width="200" height="280" rx="10"/>
    </clipPath>
  </defs>
  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <!-- Línea dorada decorativa -->
  <rect x="80" y="450" width="1040" height="1.5" rx="1" fill="#d4af37" opacity="0.25"/>
  <!-- Miniatura del folleto (placeholder: rect con gradiente simulando cover) -->
  <rect x="80" y="120" width="200" height="280" rx="8" fill="#132a4a" stroke="#d4af37" stroke-width="2"/>
  <!-- Texto del folleto simulado -->
  <text x="180" y="220" text-anchor="middle" fill="#d4af37" font-family="Georgia,serif" font-size="16" font-weight="700" opacity="0.9">FOLLETO</text>
  <text x="180" y="245" text-anchor="middle" fill="#c9a96e" font-family="Georgia,serif" font-size="12" font-weight="600" opacity="0.7">3ER TRIMESTRE</text>
  <text x="180" y="270" text-anchor="middle" fill="#d4af37" font-family="Georgia,serif" font-size="20" font-weight="700" opacity="0.9">2026</text>
  <line x1="130" y1="290" x2="230" y2="290" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <text x="180" y="315" text-anchor="middle" fill="#c9a96e" font-family="Georgia,serif" font-size="11" font-weight="600" opacity="0.7">1° Y 2°</text>
  <text x="180" y="335" text-anchor="middle" fill="#c9a96e" font-family="Georgia,serif" font-size="11" font-weight="600" opacity="0.7">CORINTIOS</text>
  <!-- Título principal -->
  <text x="340" y="260" fill="#d4af37" font-family="Georgia,serif" font-size="52" font-weight="700">Escuela Sabática</text>
  <!-- Subtítulo -->
  <text x="340" y="310" fill="#b8952e" font-family="Georgia,serif" font-size="24" font-weight="400" font-style="italic" opacity="0.85">...un lugar de estudio</text>
  <!-- URL -->
  <text x="80" y="510" fill="#64748b" font-family="system-ui,sans-serif" font-size="16" opacity="0.6">escuelasabatica.cl</text>
  <!-- Detalles decorativos -->
  <circle cx="1100" cy="100" r="3" fill="#d4af37" opacity="0.15"/>
  <circle cx="1050" cy="520" r="2" fill="#d4af37" opacity="0.1"/>
  <circle cx="150" cy="550" r="2.5" fill="#d4af37" opacity="0.12"/>
</svg>