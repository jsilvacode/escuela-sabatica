<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none">
  <defs>
    <linearGradient id="audioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d33"/>
      <stop offset="50%" stop-color="#132a4a"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="audioGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="220" rx="8" fill="url(#audioBg)"/>
  <ellipse cx="160" cy="120" rx="100" ry="80" fill="url(#audioGlow)"/>
  <!-- Speaker body -->
  <rect x="94" y="86" width="28" height="48" rx="4" fill="#d4af37"/>
  <polygon points="122,86 150,68 150,152 122,134" fill="#c9a96e"/>
  <!-- Sound waves -->
