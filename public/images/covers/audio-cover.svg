  <path d="M174 84q14 26 0 52" stroke="#c9a96e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M186 74q20 36 0 72" stroke="#d4af37" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="60" cy="40" r="2" fill="#d4af37" opacity="0.3"/>
  <circle cx="270" cy="50" r="1.5" fill="#d4af37" opacity="0.2"/>
  <circle cx="250" cy="180" r="2" fill="#d4af37" opacity="0.25"/>
  <circle cx="80" cy="185" r="1.5" fill="#d4af37" opacity="0.15"/>
