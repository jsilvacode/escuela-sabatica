<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 364" fill="none">
  <defs>
    <linearGradient id="ytBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d33"/>
      <stop offset="50%" stop-color="#4a1a1a"/>
      <stop offset="100%" stop-color="#8a2020"/>
    </linearGradient>
    <linearGradient id="ytGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="260" height="364" rx="6" fill="url(#ytBg)"/>
  <ellipse cx="130" cy="180" rx="90" ry="120" fill="url(#ytGlow)"/>
  <!-- YouTube play button circle -->
  <circle cx="130" cy="170" r="48" fill="none" stroke="#d4af37" stroke-width="3"/>
  <!-- Play triangle -->
  <polygon points="118,150 118,190 148,170" fill="#d4af37"/>
  <!-- Decorative lines suggesting video/list -->
  <rect x="62" y="230" width="136" height="4" rx="2" fill="#d4af37" opacity="0.3"/>
  <rect x="62" y="242" width="100" height="4" rx="2" fill="#d4af37" opacity="0.2"/>
  <rect x="62" y="254" width="120" height="4" rx="2" fill="#d4af37" opacity="0.15"/>
  <!-- Label -->
  <text x="130" y="310" text-anchor="middle" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="700" opacity="0.8">DIÁLOGO</text>
  <text x="130" y="328" text-anchor="middle" fill="#c9a96e" font-family="system-ui" font-size="12" font-weight="500" opacity="0.6">BÍBLICO</text>
</svg>