<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none">
  <defs>
    <linearGradient id="pptBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1d33"/>
      <stop offset="50%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#2d4a2d"/>
    </linearGradient>
    <linearGradient id="pptGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0b1d33"/>
    </linearGradient>
  </defs>
  <rect width="320" height="220" rx="8" fill="url(#pptBg)"/>
  <ellipse cx="160" cy="120" rx="100" ry="80" fill="url(#pptGlow)"/>
  <!-- Screen -->
  <rect x="76" y="58" width="168" height="106" rx="6" fill="url(#screenGrad)" stroke="#d4af37" stroke-width="2.5"/>
  <!-- Slide content bars -->
  <rect x="94" y="78" width="132" height="6" rx="3" fill="#d4af37" opacity="0.6"/>
  <rect x="94" y="92" width="100" height="6" rx="3" fill="#c9a96e" opacity="0.4"/>
  <rect x="94" y="106" width="116" height="6" rx="3" fill="#d4af37" opacity="0.35"/>
  <rect x="94" y="120" width="80" height="6" rx="3" fill="#c9a96e" opacity="0.3"/>
  <!-- Triangle play icon on screen -->
  <polygon points="190,112 190,134 208,123" fill="#d4af37" opacity="0.2"/>
  <!-- Stand -->
  <line x1="160" y1="164" x2="160" y2="184" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <line x1="136" y1="192" x2="184" y2="192" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <!-- Decorative dots -->
  <circle cx="50" cy="35" r="2" fill="#d4af37" opacity="0.25"/>
  <circle cx="280" cy="45" r="1.5" fill="#d4af37" opacity="0.2"/>
  <circle cx="270" cy="190" r="2" fill="#d4af37" opacity="0.2"/>
</svg>